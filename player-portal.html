<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAMPARA — Player Portal</title>
  <meta name="description" content="View your quest progression and profile in the Lampara archive.">
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
  <style>
    :root {
      --bg: #0a0805;
      --bgp: #100d08;
      --bgc: #16120b;
      --bgh: #1e1810;
      --gold: #c9953a;
      --goldl: #e8b84b;
      --goldd: #7a5820;
      --gok: #2d6a3f;
      --crim: #8b2020;
      --tp: #e8dcc8;
      --ts: #a89070;
      --td: #6b5740;
      --bdr: #2e2218;
      --bdrg: #3d2d14;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Crimson Text', Georgia, serif;
      background: var(--bg);
      color: var(--tp);
      min-height: 100vh;
      background-image: radial-gradient(ellipse 70% 60% at 50% -5%, rgba(201, 149, 58, .09) 0%, transparent 70%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9953a' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    /* Fix browser autofill background */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active {
      -webkit-box-shadow: 0 0 0 30px var(--bgc) inset !important;
      -webkit-text-fill-color: var(--tp) !important;
      caret-color: var(--tp);
    }

    /* Login Section */
    #login-view {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    #portal-view {
      display: none;
    }

    .login-wrap {
      width: 420px;
      max-width: 95vw;
      animation: appear .8s cubic-bezier(.16, 1, .3, 1) both;
    }

    @keyframes appear {
      from {
        opacity: 0;
        transform: translateY(28px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 24px;
    }

    .lamp-svg {
      width: 56px;
      height: 56px;
      filter: drop-shadow(0 0 14px rgba(201, 149, 58, .5));
      animation: pulse 3s ease-in-out infinite;
      margin-bottom: 12px;
    }

    @keyframes pulse {

      0%,
      100% {
        filter: drop-shadow(0 0 10px rgba(201, 149, 58, .4));
      }

      50% {
        filter: drop-shadow(0 0 24px rgba(232, 184, 75, .7));
      }
    }

    .brand-title {
      font-family: 'Cinzel', serif;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 8px;
      background: linear-gradient(135deg, var(--goldl), var(--gold), var(--goldd));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .brand-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      letter-spacing: 4px;
      color: var(--td);
    }

    .lcard {
      background: var(--bgp);
      border: 1px solid var(--bdrg);
      border-radius: 10px;
      padding: 28px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, .7);
      position: relative;
      overflow: hidden;
    }

    .lcard::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: .5;
    }

    .lcard-title {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--ts);
      text-align: center;
      margin-bottom: 18px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      letter-spacing: 2px;
      color: var(--td);
      display: block;
      margin-bottom: 5px;
    }

    .field input {
      width: 100%;
      background: var(--bgc);
      border: 1px solid var(--bdr);
      border-radius: 5px;
      padding: 11px 12px;
      color: var(--tp);
      font-family: 'Crimson Text', serif;
      font-size: 14px;
      outline: none;
      transition: border-color .3s;
    }

    .field input:focus {
      border-color: var(--gold);
    }

    .field input::placeholder {
      color: var(--td);
      opacity: .6;
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, rgba(201, 149, 58, .22), rgba(201, 149, 58, .08));
      border: 1px solid var(--goldd);
      border-radius: 5px;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--goldl);
      cursor: pointer;
      transition: all .25s;
    }

    .btn-primary:hover {
      border-color: var(--gold);
      box-shadow: 0 0 20px rgba(201, 149, 58, .2);
    }

    .btn-primary:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .login-err {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: #e06060;
      text-align: center;
      margin-bottom: 10px;
      min-height: 14px;
    }

    .login-foot {
      text-align: center;
      margin-top: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--ts);
      letter-spacing: 1px;
    }

    .login-foot a {
      color: var(--goldl);
      text-decoration: none;
      font-weight: 600;
    }

    .login-foot a:hover {
      color: var(--gold);
      text-decoration: underline;
    }

    /* PORTAL LAYOUT */
    .portal-header {
      padding: 16px 24px;
      background: var(--bgp);
      border-bottom: 1px solid var(--bdrg);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .portal-brand {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(135deg, var(--goldl), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      flex: 1;
    }

    .portal-user {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .portal-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2d6a3f, #6dba85);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
    }

    .portal-name {
      font-size: 12px;
      color: var(--tp);
      font-weight: 600;
    }

    .portal-codex {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--gold);
    }

    .portal-logout {
      background: none;
      border: 1px solid var(--bdr);
      border-radius: 3px;
      padding: 5px 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      color: var(--td);
      cursor: pointer;
      letter-spacing: 1px;
      transition: all .2s;
    }

    .portal-logout:hover {
      border-color: var(--crim);
      color: #e06060;
    }

    .portal-content {
      padding: 24px;
      max-width: 900px;
      margin: 0 auto;
    }

    /* Profile Card */
    .profile-card {
      background: var(--bgp);
      border: 1px solid var(--bdrg);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 18px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 16px;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .profile-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: .4;
    }

    .profile-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2d6a3f, #6dba85);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .profile-info h2 {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--tp);
      margin-bottom: 3px;
    }

    .profile-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--td);
      letter-spacing: 1px;
    }

    .profile-stats {
      display: flex;
      gap: 16px;
    }

    .profile-stat {
      text-align: center;
    }

    .profile-stat-val {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--goldl);
    }

    .profile-stat-lbl {
      font-family: 'JetBrains Mono', monospace;
      font-size: 7px;
      letter-spacing: 1.5px;
      color: var(--td);
      text-transform: uppercase;
    }

    /* Progression */
    .section-title {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--tp);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--bdrg), transparent);
    }

    .chapter-card {
      background: var(--bgp);
      border: 1px solid var(--bdrg);
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .chapter-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: background .2s;
    }

    .chapter-header:hover {
      background: var(--bgh);
    }

    .chapter-num {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--gold);
      min-width: 80px;
    }

    .chapter-bar {
      flex: 1;
      height: 6px;
      background: var(--bdr);
      border-radius: 3px;
      overflow: hidden;
    }

    .chapter-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--goldd), var(--gold));
      transition: width .5s ease;
    }

    .chapter-pct {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--ts);
      min-width: 40px;
      text-align: right;
    }

    .chapter-body {
      padding: 0 16px 14px;
      border-top: 1px solid var(--bdr);
      display: none;
    }

    .chapter-body.open {
      display: block;
      padding-top: 12px;
    }

    .quest-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(46, 34, 24, .5);
    }

    .quest-row:last-child {
      border-bottom: none;
    }

    .quest-label {
      font-size: 11px;
      color: var(--ts);
      flex: 1;
    }

    .quest-check {
      font-size: 10px;
    }

    .quest-check.done {
      color: #6dba85;
    }

    .quest-check.not {
      color: var(--td);
      opacity: .4;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--td);
    }

    .empty-state-icon {
      font-size: 36px;
      margin-bottom: 8px;
      opacity: .4;
    }

    .empty-state-text {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--ts);
    }

    /* ============================================================
       RESPONSIVE DESIGN - MOBILE
       ============================================================ */

    /* Mobile header toggle */
    .mobile-menu-btn {
      display: none;
      background: none;
      border: 1px solid var(--bdrg);
      border-radius: 4px;
      padding: 6px;
      color: var(--gold);
      cursor: pointer;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ──────────────────────────────────────────────────
       TABLET: max-width 768px
       ────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .portal-content {
        max-width: 100%;
        padding: 20px 16px;
      }

      .profile-card {
        grid-template-columns: 1fr;
        text-align: center;
        gap: 16px;
        padding: 16px;
      }

      .profile-avatar {
        margin: 0 auto;
      }

      .profile-stats {
        justify-content: center;
      }

      .portal-header {
        padding: 12px 16px;
      }
    }

    /* ──────────────────────────────────────────────────
       MOBILE: max-width 640px
       ────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .portal-header {
        flex-wrap: wrap;
        padding: 10px 12px;
        gap: 10px;
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--bgp);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      }

      .mobile-menu-btn {
        display: flex;
      }

      .portal-brand {
        width: 100%;
        text-align: center;
        order: -1;
        font-size: 13px;
      }

      .portal-user {
        flex: 1;
      }

      .user-details {
        display: none;
      }

      .user-details.mobile-show {
        display: block;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: var(--bgp);
        border-bottom: 1px solid var(--bdrg);
        padding: 12px;
        animation: slideDown 0.3s ease;
      }

      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .portal-logout {
        padding: 10px 20px;
        font-size: 9px;
        height: 44px; /* Minimum touch target */
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .portal-content {
        padding: 16px 12px;
      }

      .profile-card {
        padding: 14px;
        gap: 14px;
      }

      .profile-avatar {
        width: 52px;
        height: 52px;
        font-size: 18px;
      }

      .profile-info {
        h2 {
          font-size: 15px;
        }
      }

      .profile-meta {
        font-size: 8px;
      }

      .profile-stat-val {
        font-size: 20px;
      }

      .section-title {
        font-size: 11px;
        margin-bottom: 10px;
      }

      .chapter-card {
        margin-bottom: 10px;
      }

      .chapter-header {
        padding: 12px;
        gap: 8px;
      }

      .chapter-num {
        font-size: 9px;
        min-width: 70px;
      }

      .chapter-pct {
        font-size: 9px;
        min-width: 35px;
      }

      .quest-label {
        font-size: 10px;
      }

      .quest-check {
        font-size: 12px;
      }

      .empty-state {
        padding: 30px 20px;
      }

      .empty-state-icon {
        font-size: 32px;
      }

      .empty-state-text {
        font-size: 11px;
      }
    }

    /* ──────────────────────────────────────────────────
       MOBILE SMALL: max-width 480px
       ────────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .portal-content {
        padding: 12px 10px;
      }

      .profile-card {
        padding: 12px;
        gap: 12px;
      }

      .profile-avatar {
        width: 48px;
        height: 48px;
        font-size: 16px;
      }

      .profile-info {
        h2 {
          font-size: 14px;
        }
      }

      .profile-meta {
        font-size: 7px;
      }

      .profile-stats {
        gap: 12px;
      }

      .profile-stat-val {
        font-size: 18px;
      }

      .profile-stat-lbl {
        font-size: 6px;
      }

      .section-title {
        font-size: 10px;
      }

      .chapter-header {
        padding: 10px;
      }

      .chapter-num {
        font-size: 8px;
        min-width: 60px;
      }

      .chapter-bar {
        height: 5px;
      }

      .chapter-pct {
        font-size: 8px;
        min-width: 32px;
      }

      .quest-row {
        padding: 5px 0;
      }

      .quest-label {
        font-size: 9px;
      }

      /* Login screen optimizations */
      .login-wrap {
        width: 100%;
        padding: 0;
      }

      .brand {
        margin-bottom: 16px;
      }

      .lamp-svg {
        width: 48px;
        height: 48px;
      }

      .brand-title {
        font-size: 22px;
        letter-spacing: 6px;
      }

      .brand-sub {
        font-size: 7px;
      }

      .lcard {
        padding: 16px;
        border-radius: 8px;
      }

      .lcard-title {
        font-size: 9px;
        margin-bottom: 14px;
      }

      .field {
        margin-bottom: 12px;
      }

      .field label {
        font-size: 7px;
        margin-bottom: 4px;
      }

      .field input {
        padding: 10px;
        font-size: 13px;
        height: 44px; /* Minimum touch target */
      }

      .btn-primary {
        padding: 14px;
        font-size: 10px;
        height: 44px; /* Minimum touch target */
        letter-spacing: 3px;
      }

      .login-err {
        font-size: 8px;
      }

      .login-foot {
        margin-top: 14px;
      }

      .login-foot a {
        padding: 4px; /* Make link easier to tap */
      }

      .portal-header {
        padding: 8px 10px;
      }

      .portal-brand {
        font-size: 12px;
      }

      .portal-avatar {
        width: 28px;
        height: 28px;
        font-size: 10px;
      }

      .portal-name {
        font-size: 11px;
      }

      .portal-codex {
        font-size: 7px;
      }
    }

    /* ──────────────────────────────────────────────────
       MOBILE EXTRA SMALL: max-width 360px
       ────────────────────────────────────────────────── */
    @media (max-width: 360px) {
      .portal-content {
        padding: 10px 8px;
      }

      .profile-card {
        padding: 10px;
      }

      .profile-avatar {
        width: 44px;
        height: 44px;
        font-size: 14px;
      }

      .profile-info {
        h2 {
          font-size: 13px;
        }
      }

      .profile-stat-val {
        font-size: 16px;
      }

      .chapter-header {
        padding: 8px;
      }

      .chapter-num {
        font-size: 7px;
        min-width: 50px;
      }

      .lcard {
        padding: 12px;
      }

      .field input {
        padding: 8px;
        font-size: 12px;
      }
    }

    /* ──────────────────────────────────────────────────
       LANDSCAPE MOBILE
       ────────────────────────────────────────────────── */
    @media (max-width: 768px) and (max-height: 500px) {
      .portal-header {
        padding: 8px 12px;
      }

      .portal-content {
        padding: 12px;
      }

      .profile-card {
        margin-bottom: 12px;
      }

      .login-wrap {
        max-width: 90vw;
      }
    }

    /* Enhanced touch targets */
    @media (pointer: coarse) {
      .chapter-header {
        min-height: 44px;
      }

      .quest-row {
        min-height: 36px;
      }

      .btn-primary {
        min-height: 44px;
      }

      .portal-logout {
        min-height: 44px;
      }

      .mobile-menu-btn {
        min-width: 44px;
        min-height: 44px;
      }

      .login-foot a {
        padding: 8px 4px;
        display: inline-block;
        min-height: 44px;
      }
    }

    /* Reduced motion support */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>

  <!-- LOGIN VIEW -->
  <div id="login-view">
    <div class="login-wrap">
      <div class="brand">
        <svg class="lamp-svg" viewBox="0 0 64 64" fill="none">
          <path d="M32 6C32 6 20 18 20 30C20 36.6 23.6 42.4 28 46V54H36V46C40.4 42.4 44 36.6 44 30C44 18 32 6 32 6Z"
            fill="url(#lg1)" opacity="0.92" />
          <ellipse cx="32" cy="29" rx="7" ry="9" fill="url(#lg2)" opacity="0.65" />
          <path d="M27 54H37V57H27V54Z" fill="#7a5820" />
          <path d="M25 57H39V61H25V57Z" fill="#5a3e10" />
          <defs>
            <linearGradient id="lg1" x1="32" y1="6" x2="32" y2="57" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#e8b84b" />
              <stop offset="100%" stop-color="#7a5820" />
            </linearGradient>
            <radialGradient id="lg2" cx="50%" cy="40%">
              <stop offset="0%" stop-color="#fff8e8" />
              <stop offset="100%" stop-color="#f0a832" stop-opacity="0" />
            </radialGradient>
          </defs>
        </svg>
        <div class="brand-title">LAMPARA</div>
        <div class="brand-sub">Player Portal</div>
      </div>

      <div class="lcard">
        <div class="lcard-title">SIGN IN TO YOUR ACCOUNT</div>
        <div class="field">
          <label>USERNAME</label>
          <input type="text" id="pl-user" placeholder="Your username">
        </div>
        <div class="field">
          <label>PASSWORD</label>
          <input type="password" id="pl-pass" placeholder="Your password">
        </div>
        <div class="login-err" id="pl-err"></div>
        <button class="btn-primary" id="pl-login-btn" onclick="playerLogin()">⚜ SIGN IN</button>
      </div>

      <div class="login-foot">
        Don't have an account? <a href="/register">Register here</a>
      </div>
    </div>
  </div>

  <!-- PORTAL VIEW -->
  <div id="portal-view">
    <div class="portal-header">
      <div class="portal-brand">⚜ LAMPARA</div>
      <button class="mobile-menu-btn" id="user-toggle" onclick="toggleUserDetails()" aria-label="Toggle user details">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
        </svg>
      </button>
      <div class="portal-user">
        <div class="portal-avatar" id="p-avatar">—</div>
        <div class="user-details" id="user-details">
          <div class="portal-name" id="p-name">Player</div>
          <div class="portal-codex" id="p-codex">Codex: —</div>
        </div>
      </div>
      <button class="portal-logout" onclick="portalLogout()">SIGN OUT</button>
    </div>

    <div class="portal-content">
      <div class="profile-card">
        <div class="profile-avatar" id="p-big-avatar">—</div>
        <div class="profile-info">
          <h2 id="p-full-name">Player Name</h2>
          <div class="profile-meta" id="p-meta">@username · email@example.com</div>
        </div>
        <div class="profile-stats">
          <div class="profile-stat">
            <div class="profile-stat-val" id="p-progress">0%</div>
            <div class="profile-stat-lbl">Progress</div>
          </div>
          <div class="profile-stat">
            <div class="profile-stat-val" id="p-chapter">1</div>
            <div class="profile-stat-lbl">Chapter</div>
          </div>
        </div>
      </div>

      <div class="section-title">QUEST PROGRESSION</div>
      <div id="progression-container">
        <div class="empty-state">
          <div class="empty-state-icon">📜</div>
          <div class="empty-state-text">Loading progression...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ⚠ API URL source of truth: src/config.js (API_CONFIG.baseUrl)
    // This standalone page duplicates it for self-containment.
    const API_BASE = 'https://lampara-production.up.railway.app/api';
    let playerToken = localStorage.getItem('lampara_player_token');
    let playerData = null;
    let userMenuOpen = false;

    // Check if already logged in
    if (playerToken) {
      checkSession();
    }

    // Toggle user details on mobile
    function toggleUserDetails() {
      userMenuOpen = !userMenuOpen;
      const details = document.getElementById('user-details');
      if (details) {
        details.classList.toggle('mobile-show');
      }
    }

    // Close user menu when clicking outside on mobile
    document.addEventListener('click', function(e) {
      if (userMenuOpen && !e.target.closest('.portal-user') && !e.target.closest('.mobile-menu-btn')) {
        const details = document.getElementById('user-details');
        if (details) {
          details.classList.remove('mobile-show');
        }
        userMenuOpen = false;
      }
    });

    // Enter key on password field
    document.getElementById('pl-pass')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') playerLogin();
    });

    async function playerLogin() {
      const username = document.getElementById('pl-user').value.trim();
      const password = document.getElementById('pl-pass').value;
      const errEl = document.getElementById('pl-err');
      errEl.textContent = '';

      if (!username || !password) { errEl.textContent = 'Username and password required'; return; }

      const btn = document.getElementById('pl-login-btn');
      btn.disabled = true;

      try {
        const res = await fetch(`${API_BASE}/auth/player-login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (!res.ok) { errEl.textContent = data.error || 'Login failed'; btn.disabled = false; return; }

        playerToken = data.token;
        playerData = data.player;
        localStorage.setItem('lampara_player_token', playerToken);

        showPortal();
      } catch {
        errEl.textContent = 'Could not connect to server';
        btn.disabled = false;
      }
    }

    async function checkSession() {
      try {
        const res = await fetch(`${API_BASE}/auth/me`, {
          headers: { 'Authorization': `Bearer ${playerToken}` }
        });
        if (!res.ok) throw new Error();
        const data = await res.json();
        playerData = data.user;
        showPortal();
      } catch {
        localStorage.removeItem('lampara_player_token');
        playerToken = null;
      }
    }

    function showPortal() {
      document.getElementById('login-view').style.display = 'none';
      document.getElementById('portal-view').style.display = 'block';

      const p = playerData;
      const initials = p.name ? p.name.substring(0, 2).toUpperCase() : '??';
      const codex = `${p.chapter || 1}-${p.current_main_quest || 1}`;

      document.getElementById('p-avatar').textContent = initials;
      document.getElementById('p-big-avatar').textContent = initials;
      document.getElementById('p-name').textContent = p.name;
      document.getElementById('p-full-name').textContent = p.name;
      document.getElementById('p-meta').textContent = `@${p.username} · ${p.email || '—'}`;
      document.getElementById('p-codex').textContent = `Codex: ${codex}`;
      document.getElementById('p-chapter').textContent = p.chapter || 1;

      loadProgression();
    }

    async function loadProgression() {
      const container = document.getElementById('progression-container');
      try {
        const res = await fetch(`${API_BASE}/players/${playerData.id}/progression`, {
          headers: { 'Authorization': `Bearer ${playerToken}` }
        });

        if (!res.ok) {
          container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📜</div><div class="empty-state-text">No quest data available yet</div></div>';
          return;
        }

        const data = await res.json();
        document.getElementById('p-progress').textContent = data.overall_progress + '%';

        if (!data.chapters || data.chapters.length === 0) {
          container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📜</div><div class="empty-state-text">Your journey has not started yet</div></div>';
          return;
        }

        container.innerHTML = '';
        data.chapters.forEach(ch => {
          const totalSubs = ch.quests.reduce((sum, q) => sum + q.total_count, 0);
          const completedSubs = ch.quests.reduce((sum, q) => sum + q.completed_count, 0);
          const pct = totalSubs > 0 ? Math.round((completedSubs / totalSubs) * 100) : 0;

          const card = document.createElement('div');
          card.className = 'chapter-card';
          card.innerHTML = `
          <div class="chapter-header" onclick="this.nextElementSibling.classList.toggle('open')">
            <div class="chapter-num">CHAPTER ${ch.chapter}</div>
            <div class="chapter-bar"><div class="chapter-fill" style="width:${pct}%"></div></div>
            <div class="chapter-pct">${pct}%</div>
          </div>
          <div class="chapter-body">
            ${ch.quests.map(q => `
              <div style="margin-bottom:8px">
                <div style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;color:var(--gold);margin-bottom:4px">QUEST ${q.quest} — ${q.completion}%</div>
                ${q.sub_quests.map(sq => `
                  <div class="quest-row">
                    <span class="quest-check ${sq.status === 'completed' ? 'done' : 'not'}">${sq.status === 'completed' ? '✓' : '○'}</span>
                    <span class="quest-label">${sq.title}</span>
                  </div>
                `).join('')}
              </div>
            `).join('')}
          </div>
        `;
          container.appendChild(card);
        });
      } catch {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠</div><div class="empty-state-text">Failed to load progression data</div></div>';
      }
    }

    function portalLogout() {
      // Call logout endpoint
      if (playerToken) {
        fetch(`${API_BASE}/auth/player-logout`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${playerToken}`, 'Content-Type': 'application/json' }
        }).catch(() => { });
      }
      localStorage.removeItem('lampara_player_token');
      playerToken = null;
      playerData = null;
      location.reload();
    }
  </script>
</body>

</html>

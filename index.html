<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAMPARA — Enter the Archive</title>
  <meta name="description" content="LAMPARA: An interactive journey through El Filibusterismo. Sign in to begin.">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
  <style>
    :root {
      --bg: #0a0805; --bgp: #100d08; --bgc: #16120b; --bgh: #1e1810;
      --gold: #c9953a; --goldl: #e8b84b; --goldd: #7a5820;
      --gok: #2d6a3f; --crim: #8b2020;
      --tp: #e8dcc8; --ts: #a89070; --td: #6b5740;
      --bdr: #2e2218; --bdrg: #3d2d14;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Crimson Text', Georgia, serif;
      background: var(--bg); color: var(--tp);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      overflow-x: hidden;
      background-image:
        radial-gradient(ellipse 70% 60% at 50% -5%, rgba(201,149,58,.09) 0%, transparent 70%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9953a' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    /* Particles */
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .particle { position: absolute; width: 2px; height: 2px; background: var(--goldl); border-radius: 50%; opacity: 0; animation: float linear infinite; }
    @keyframes float { 0% { opacity: 0; transform: translateY(100vh) scale(0); } 10% { opacity: .6; } 90% { opacity: .2; } 100% { opacity: 0; transform: translateY(-10vh) scale(1); } }

    .wrap {
      position: relative; z-index: 1;
      width: 560px; max-width: 92vw;
      display: flex; flex-direction: column; align-items: center;
      padding: 24px 0;
      animation: appear .8s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes appear { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }

    /* Brand */
    .brand { display: flex; flex-direction: column; align-items: center; margin-bottom: 28px; text-align: center; }
    .lamp-wrap { position: relative; margin-bottom: 16px; }
    .lamp-svg {
      width: 80px; height: 80px;
      filter: drop-shadow(0 0 20px rgba(201,149,58,.5));
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { filter: drop-shadow(0 0 14px rgba(201,149,58,.4)); } 50% { filter: drop-shadow(0 0 32px rgba(232,184,75,.75)); } }
    .lamp-ring { position: absolute; inset: -12px; border: 1px solid rgba(201,149,58,.15); border-radius: 50%; animation: ring-pulse 3s ease-in-out infinite; }
    .lamp-ring-2 { position: absolute; inset: -24px; border: 1px solid rgba(201,149,58,.07); border-radius: 50%; animation: ring-pulse 3s ease-in-out infinite .4s; }
    @keyframes ring-pulse { 0%,100% { opacity: .4; transform: scale(1); } 50% { opacity: 1; transform: scale(1.06); } }
    
    .title {
      font-family: 'Cinzel', serif;
      font-size: 36px; font-weight: 900; letter-spacing: 12px;
      background: linear-gradient(135deg, var(--goldl), var(--gold), var(--goldd));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      line-height: 1; margin-bottom: 8px;
    }
    .subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; letter-spacing: 4px; color: var(--td); text-transform: uppercase;
    }

    /* Divider */
    .divider { width: 100%; display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
    .divl { flex: 1; height: 1px; }
    .divl.a { background: linear-gradient(90deg, transparent, var(--bdrg)); }
    .divl.b { background: linear-gradient(90deg, var(--bdrg), transparent); }
    .divsym { font-family: 'Cinzel', serif; font-size: 14px; color: var(--goldd); }

    /* Quote */
    .quote {
      font-family: 'Crimson Text', serif;
      font-style: italic;
      font-size: 16px; line-height: 1.6;
      color: var(--ts);
      text-align: center;
      max-width: 400px;
      margin-bottom: 24px;
    }
    .quote-src {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-style: normal;
      font-size: 10px; letter-spacing: 1px;
      color: var(--td);
      margin-top: 8px;
      text-align: right;
    }

    /* Status Badge */
    .status-badge {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: 1.5px;
      color: #6dba85;
      background: rgba(45,106,63,.1);
      border: 1px solid rgba(45,106,63,.3);
      border-radius: 4px;
      padding: 6px 14px;
      margin-bottom: 28px;
    }
    .status-dot {
      width: 6px; height: 6px;
      background: #6dba85;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(109,186,133,.6);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

    /* Enter Button */
    .enter-btn {
      font-family: 'Cinzel', serif;
      font-size: 14px; font-weight: 700; letter-spacing: 4px;
      color: var(--goldl);
      text-decoration: none;
      text-transform: uppercase;
      padding: 12px 32px;
      border: 1px solid var(--goldd);
      border-radius: 4px;
      background: transparent;
      transition: all .3s ease;
      display: inline-block;
      margin-bottom: 28px;
    }
    .enter-btn:hover {
      border-color: var(--gold);
      color: #fff8e8;
      box-shadow: 0 0 24px rgba(201,149,58,.25);
      transform: translateY(-1px);
    }
    .enter-btn:active {
      transform: translateY(0);
    }

    /* Footer */
    .foot {
      margin-top: 28px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; color: var(--td); letter-spacing: 1.5px;
      text-align: center; line-height: 2;
    }

    /* ─── RESPONSIVE ─── */

    /* Tablet */
    @media (max-width: 768px) {
      .wrap { width: 92vw; padding: 20px 0; }
      .lamp-svg { width: 64px; height: 64px; }
      .title { font-size: 28px; letter-spacing: 8px; }
      .quote { font-size: 15px; }
      .enter-btn { font-size: 13px; padding: 10px 28px; }
    }

    /* Mobile */
    @media (max-width: 480px) {
      .wrap { width: 100%; padding: 16px 0; }
      .brand { margin-bottom: 20px; }
      .lamp-svg { width: 48px; height: 48px; }
      .lamp-ring { inset: -8px; }
      .lamp-ring-2 { inset: -16px; }
      .title { font-size: 22px; letter-spacing: 5px; }
      .subtitle { font-size: 8px; }
      .divider { margin-bottom: 16px; }
      .quote { font-size: 14px; padding: 0 8px; }
      .status-badge { margin-bottom: 20px; font-size: 9px; }
      .enter-btn { font-size: 12px; padding: 10px 24px; letter-spacing: 3px; }
      .foot { margin-top: 20px; font-size: 8px; }
    }
  </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="wrap">

  <!-- Brand -->
  <div class="brand">
    <div class="lamp-wrap">
      <div class="lamp-ring"></div>
      <div class="lamp-ring-2"></div>
      <svg class="lamp-svg" viewBox="0 0 64 64" fill="none">
        <path d="M32 6C32 6 20 18 20 30C20 36.6 23.6 42.4 28 46V54H36V46C40.4 42.4 44 36.6 44 30C44 18 32 6 32 6Z" fill="url(#lg1)" opacity="0.92"/>
        <ellipse cx="32" cy="29" rx="7" ry="9" fill="url(#lg2)" opacity="0.65"/>
        <path d="M27 54H37V57H27V54Z" fill="#7a5820"/>
        <path d="M25 57H39V61H25V57Z" fill="#5a3e10"/>
        <defs>
          <linearGradient id="lg1" x1="32" y1="6" x2="32" y2="57" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#e8b84b"/><stop offset="100%" stop-color="#7a5820"/>
          </linearGradient>
          <radialGradient id="lg2" cx="50%" cy="40%">
            <stop offset="0%" stop-color="#fff8e8"/><stop offset="100%" stop-color="#f0a832" stop-opacity="0"/>
          </radialGradient>
        </defs>
      </svg>
    </div>
    <div class="title">LAMPARA</div>
    <div class="subtitle">El Filibusterismo · Interactive Archive</div>
  </div>

  <div class="divider">
    <div class="divl a"></div>
    <div class="divsym">⚜</div>
    <div class="divl b"></div>
  </div>

  <!-- Lore Quote -->
  <div class="quote">
    "Seek the light, for the archive holds the truth buried in the pages of revolution."
    <span class="quote-src">— from the Archive</span>
  </div>

  <!-- System Status -->
  <div class="status-badge">
    <div class="status-dot"></div>
    SYSTEM ONLINE · 57 ENROLLED
  </div>

  <!-- Enter Button -->
  <a href="/player-portal" class="enter-btn">Enter the Archive →</a>

  <div class="foot">
    STI College General Santos · BSIT Capstone 2026<br>
    Authorized Personnel Only
  </div>

</div>

<script>
  // Responsive particle count
  const isMobile = window.innerWidth <= 480;
  const particleCount = isMobile ? 8 : 20;

  const pWrap = document.getElementById('particles');
  for (let i = 0; i < particleCount; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (6 + Math.random() * 10) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    p.style.width = p.style.height = (1 + Math.random() * 2.5) + 'px';
    pWrap.appendChild(p);
  }
</script>

</body>
</html>
